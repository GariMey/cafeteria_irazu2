<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reto 2 - Top 5 Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">☕ Reto 2 — Top 5 productos</span>
    <div>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a href="{% url 'reto1' %}" class="btn btn-outline-light btn-sm me-2">Reto 1</a>
        <a href="{% url 'reto3' %}" class="btn btn-outline-light btn-sm">Reto 3</a>
    </div>
</nav>

<div class="container py-5">
    <h2 class="mb-4">Top 5 productos más vendidos</h2>

    {% if productos %}
    <div class="row g-4">
        {% for p in productos %}
        <div class="col-md-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div class="d-flex align-items-center gap-3">
                            <span class="badge bg-warning text-dark fs-5">#{{ forloop.counter }}</span>
                            <h5 class="mb-0">{{ p.producto }}</h5>
                        </div>
                        <span class="fw-bold fs-5">{{ p.total_vendido }} unidades</span>
                    </div>
                    <div class="progress" style="height: 20px;">
                        <div class="progress-bar bg-warning" 
                             style="width: {% widthratio p.total_vendido max_vendido 100 %}%">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="alert alert-info">No hay datos de ventas todavía.</div>
    {% endif %}
</div>

</body>
</html>
